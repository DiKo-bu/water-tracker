name: Build Flet APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses

      - name: Build APK
        run: |
          pip install --upgrade flet flet-webview
          flet build apk --include-packages flet_webview --android-app-icon assets/icon.png || flet build apk --include-packages flet_webview

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
