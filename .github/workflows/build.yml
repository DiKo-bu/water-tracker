name: Build Flet APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses

      - name: Build original APK
        run: |
          pip install --upgrade flet flet-webview
          flet build apk --android-app-icon assets/icon.png || flet build apk

      - name: Download apktool
        run: |
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          wget -q https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar
          chmod +x apktool
          sudo mv apktool /usr/local/bin/
          sudo mv apktool_2.9.3.jar /usr/local/bin/apktool.jar

      - name: Decompile APK
        run: |
          APK=$(ls build/apk/*.apk | head -1)
          apktool d -f "$APK" -o app_unpacked

      - name: Inject cleartext permission
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          ns = 'http://schemas.android.com/apk/res/android'
          ET.register_namespace('android', ns)
          tree = ET.parse('app_unpacked/AndroidManifest.xml')
          root = tree.getroot()
          app = root.find('application')
          if app is None:
              raise Exception('No <application> tag')
          app.set('{' + ns + '}usesCleartextTraffic', 'true')
          tree.write('app_unpacked/AndroidManifest.xml', encoding='utf-8', xml_declaration=True)
          print('✅ usesCleartextTraffic=true injected')
          "

      - name: Rebuild APK
        run: apktool b app_unpacked -o app_modified.apk

      - name: Generate debug keystore
        run: keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US" -noprompt

      - name: Sign APK
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner"
          $APKSIGNER sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android app_modified.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-fixed
          path: app_modified.apk            app_modified.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-fixed
          path: app_modified.apk          APK=$(ls build/apk/*.apk | head -1)
          echo "Found APK: $APK"
          apktool d -f "$APK" -o app_unpacked
          MANIFEST="app_unpacked/AndroidManifest.xml"
          sed -i 's/<application/<application android:usesCleartextTraffic="true" /' "$MANIFEST"
          grep -q 'usesCleartextTraffic' "$MANIFEST" && echo "✅ Patched" || echo "❌ Failed"
          apktool b app_unpacked -o app_modified.apk

      - name: Sign APK
        run: |
          # Генерируем дебажный ключ (как у Flutter)
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt
          # Подписываем
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner sign \
            --ks debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            app_modified.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-fixed
          path: app_modified.apk                  with open(manifest_path, 'w') as f:
                      f.write(content)
                  print('✅ Added usesCleartextTraffic=true')
              else:
                  print('Already present')
          else:
              print('⚠ Manifest not found, searching...')
              for root, dirs, files in os.walk(flet_path):
                  if 'AndroidManifest.xml' in files:
                      print(f'Found at: {os.path.join(root, \"AndroidManifest.xml\")}')
          "

      - name: Build APK
        run: |
          flet build apk --android-app-icon assets/icon.png || flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/*.apk
